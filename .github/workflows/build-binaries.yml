name: Build Veyra binaries

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build ${{ matrix.platform.name }}
    runs-on: ${{ matrix.platform.os }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: macOS DMG
            os: macos-latest
            artifact: veyra-macos
          - name: Windows EXE/MSI
            os: windows-latest
            artifact: veyra-windows
          - name: Linux AppImage/Deb/RPM
            os: ubuntu-22.04
            artifact: veyra-linux

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: launcher/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: launcher/src-tauri

      - name: Install frontend dependencies
        working-directory: launcher
        run: npm ci

      - name: Build launcher bundles
        working-directory: launcher
        run: npm run dist

      - name: Upload bundles
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform.artifact }}
          path: |
            launcher/src-tauri/target/release/bundle/**/*.dmg
            launcher/src-tauri/target/release/bundle/**/*.app.tar.gz
            launcher/src-tauri/target/release/bundle/**/*.msi
            launcher/src-tauri/target/release/bundle/**/*.exe
            launcher/src-tauri/target/release/bundle/**/*.AppImage
            launcher/src-tauri/target/release/bundle/**/*.deb
            launcher/src-tauri/target/release/bundle/**/*.rpm
          if-no-files-found: error
